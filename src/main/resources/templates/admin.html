<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Secure Vault - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: white; }
        .navbar { background: #1a1a2e; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; }
        .navbar h1 { color: #f59e0b; font-size: 20px; }
        .navbar button { background: #374151; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 8px; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; }
        .tab { padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; border: none; background: #1a1a2e; color: #9ca3af; }
        .tab.active { background: #6366f1; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
        th { background: #111827; padding: 14px 16px; text-align: left; color: #9ca3af; font-size: 13px; }
        td { padding: 12px 16px; border-top: 1px solid #374151; font-size: 13px; color: #e5e7eb; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-admin { background: #7c3aed; color: white; }
        .badge-user { background: #374151; color: #9ca3af; }
        .badge-upload { background: #065f46; color: #34d399; }
        .badge-download { background: #1e3a5f; color: #60a5fa; }
        .badge-delete { background: #7f1d1d; color: #f87171; }
        .badge-login { background: #1c1917; color: #d97706; }
        .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-delete { background: #dc2626; color: white; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1a1a2e; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h3 { font-size: 32px; color: #a78bfa; }
        .stat-card p { color: #6b7280; font-size: 14px; margin-top: 4px; }
        .empty { text-align: center; padding: 40px; color: #6b7280; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>👑 Admin Dashboard</h1>
    <div>
        <button onclick="window.location.href='/dashboard'">User View</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>
<div class="container">
    <div class="stats">
        <div class="stat-card"><h3 id="totalUsers">-</h3><p>Total Users</p></div>
        <div class="stat-card"><h3 id="totalFiles">-</h3><p>Total Files</p></div>
        <div class="stat-card"><h3 id="totalLogs">-</h3><p>Audit Events</p></div>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="showTab('files')">📁 All Files</button>
        <button class="tab" onclick="showTab('audit')">📋 Audit Logs</button>
        <button class="tab" onclick="showTab('users')">👥 Users</button>
    </div>
    <div id="files" class="section active">
        <table>
            <thead><tr><th>File Name</th><th>Size</th><th>Owner</th><th>Uploaded</th><th>Actions</th></tr></thead>
            <tbody id="fileList"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>
    <div id="audit" class="section">
        <table>
            <thead><tr><th>User</th><th>Action</th><th>File</th><th>IP Address</th><th>Time</th></tr></thead>
            <tbody id="auditList"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>
    <div id="users" class="section">
        <table>
            <thead><tr><th>Full Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody id="userList"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>
</div>
<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'ADMIN') window.location.href = '/dashboard';

    function showTab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.target.classList.add('active');
    }

    async function loadFiles() {
        const res = await fetch('/api/files/admin/all', { headers: { 'Authorization': 'Bearer ' + token } });
        const files = await res.json();
        document.getElementById('totalFiles').textContent = files.length;
        const tbody = document.getElementById('fileList');
        if (files.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No files</td></tr>'; return; }
        tbody.innerHTML = files.map(f => `
            <tr>
                <td>${f.fileName}</td>
                <td>${(f.fileSize / 1024).toFixed(1)} KB</td>
                <td>${f.uploadedBy?.email || 'Unknown'}</td>
                <td>${new Date(f.uploadedAt).toLocaleDateString()}</td>
                <td><button class="btn btn-delete" onclick="deleteFile(${f.id})">Delete</button></td>
            </tr>
        `).join('');
    }

    async function loadAuditLogs() {
        const res = await fetch('/api/audit/all', { headers: { 'Authorization': 'Bearer ' + token } });
        const logs = await res.json();
        document.getElementById('totalLogs').textContent = logs.length;
        const tbody = document.getElementById('auditList');
        if (logs.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No logs</td></tr>'; return; }
        tbody.innerHTML = logs.map(l => `
            <tr>
                <td>${l.performedBy?.email || 'Unknown'}</td>
                <td><span class="badge badge-${l.action.toLowerCase()}">${l.action}</span></td>
                <td>${l.file?.fileName || '-'}</td>
                <td>${l.ipAddress || '-'}</td>
                <td>${new Date(l.performedAt).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    async function loadUsers() {
        const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
        const users = await res.json();
        document.getElementById('totalUsers').textContent = users.length;
        const tbody = document.getElementById('userList');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.fullName}</td>
                <td>${u.email}</td>
                <td><span class="badge badge-${u.role.toLowerCase()}">${u.role}</span></td>
                <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                <td><button class="btn btn-delete" onclick="deleteUser(${u.id})">Delete</button></td>
            </tr>
        `).join('');
    }

    async function deleteFile(id) {
        if (!confirm('Delete this file?')) return;
        await fetch(`/api/files/delete/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        loadFiles();
    }

    async function deleteUser(id) {
        if (!confirm('Delete this user and ALL their files?')) return;
        await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        loadUsers(); loadFiles();
    }

    function logout() { localStorage.removeItem('token'); localStorage.removeItem('role'); window.location.href = '/login'; }

    loadFiles(); loadAuditLogs(); loadUsers();
</script>
</body>
</html>

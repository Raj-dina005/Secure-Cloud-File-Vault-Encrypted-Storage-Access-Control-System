version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: vault123
      MYSQL_DATABASE: secure_vault
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: vault-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/secure_vault
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: vault123
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data: